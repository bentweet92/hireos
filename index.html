<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HireOS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
    --border: #2a2a2a; --border2: #333; --text: #f0ede8;
    --muted: #888; --accent: #e8c547; --accent2: #c8a832;
    --danger: #e85547; --success: #47c87a; --user-bubble: #1e2a1e;
    --speakup: #4a9eff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }
  #app { display: flex; flex-direction: column; height: 100%; height: 100dvh; width: 100%; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; height: 52px; min-height: 52px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); z-index: 10; }
  .logo { font-family: 'Instrument Serif', serif; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .stage-indicator { display: flex; align-items: center; gap: 5px; }
  .stage-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 0.3s; }
  .stage-dot.active { background: var(--accent); }
  .stage-dot.done { background: var(--success); }
  .stage-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-left: 5px; }
  .progress-bar { height: 2px; background: var(--border); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; width: 0%; }

  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* UPLOAD */
  #screen-upload { align-items: center; justify-content: center; padding: 1.5rem; overflow-y: auto; }
  .upload-inner { max-width: 480px; width: 100%; text-align: center; }
  .upload-inner h1 { font-family: 'Instrument Serif', serif; font-size: clamp(34px,7vw,56px); font-weight: 400; line-height: 1.1; letter-spacing: -1px; margin-bottom: 0.875rem; }
  .upload-inner h1 em { font-style: italic; color: var(--accent); }
  .upload-inner > p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 2rem; }
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: 12px; padding: 2rem 1.5rem; cursor: pointer; transition: all 0.2s; background: var(--surface); margin-bottom: 0.875rem; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #141200; }
  .upload-icon { font-size: 28px; margin-bottom: 0.625rem; display: block; }
  .upload-zone h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .upload-zone p { font-size: 12px; color: var(--muted); margin: 0; }
  #cv-file-input { display: none; }
  .file-selected { display: none; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.625rem 0.875rem; margin-bottom: 0.875rem; text-align: left; }
  .file-selected.show { display: flex; }
  .file-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .btn-primary { width: 100%; padding: 13px 20px; background: var(--accent); color: #0a0a0a; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-appearance: none; }
  .btn-primary:active { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .skip-link { display: block; margin-top: 0.875rem; font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }

  /* CHAT */
  #screen-chat { flex-direction: column; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 1rem 1rem 0.5rem; display: flex; flex-direction: column; gap: 0.875rem; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; min-height: 0; }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .msg { display: flex; gap: 8px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 88%; }
  .msg.ai { align-self: flex-start; max-width: 92%; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; font-weight: 500; }
  .msg.ai .msg-avatar { background: var(--accent); color: #0a0a0a; }
  .msg.user .msg-avatar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  .msg.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; }
  .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid #2a3a2a; border-radius: 12px 4px 12px 12px; }
  .msg-bubble strong { color: var(--accent); font-weight: 500; }
  .typing-indicator { display: none; align-items: center; gap: 8px; }
  .typing-indicator.show { display: flex; }
  .typing-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .typing-dots { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
  .chat-input-area { flex-shrink: 0; border-top: 1px solid var(--border); padding: 0.75rem 1rem; background: var(--bg); padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; max-width: 680px; margin: 0 auto; }
  #user-input { flex: 1; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 300; resize: none; min-height: 44px; max-height: 120px; line-height: 1.4; transition: border-color 0.2s; -webkit-appearance: none; }
  #user-input:focus { outline: none; border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }
  #send-btn { width: 44px; height: 44px; min-width: 44px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; color: #0a0a0a; -webkit-appearance: none; }
  #send-btn:active { background: var(--accent2); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* PROFILE */
  #screen-profile { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.25rem; }
  .profile-inner { max-width: 640px; margin: 0 auto; padding-bottom: 2rem; }
  .profile-header { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .profile-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .profile-header h1 { font-family: 'Instrument Serif', serif; font-size: clamp(26px,5vw,34px); font-weight: 400; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  .profile-header p { font-size: 12px; color: var(--muted); }
  .profile-section { margin-bottom: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ps-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .ps-icon { font-size: 14px; }
  .ps-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; color: var(--muted); }
  .ps-body { padding: 1rem; }
  .ps-body p { font-size: 14px; line-height: 1.65; margin-bottom: 0.625rem; }
  .ps-body p:last-child { margin-bottom: 0; }
  .target-role-card { background: linear-gradient(135deg,#1a1800,#111); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .target-role-title { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--accent); margin-bottom: 3px; }
  .target-role-sub { font-size: 12px; color: var(--muted); }
  .salary-display { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 0.75rem; }
  .salary-cell { background: var(--surface2); padding: 0.875rem; text-align: center; }
  .salary-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  .salary-value { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--accent); }
  .asset-item { display: flex; gap: 8px; margin-bottom: 0.625rem; align-items: flex-start; }
  .asset-item:last-child { margin-bottom: 0; }
  .asset-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 7px; flex-shrink: 0; }
  .asset-text { font-size: 14px; line-height: 1.6; }
  .gap-item { display: flex; gap: 8px; margin-bottom: 0.875rem; align-items: flex-start; }
  .gap-item:last-child { margin-bottom: 0; }
  .gap-tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; margin-top: 3px; }
  .gap-tag.fix { background: #1a2a1a; color: var(--success); }
  .gap-tag.note { background: #2a2200; color: var(--accent); }
  .gap-tag.risk { background: #2a1a1a; color: var(--danger); }
  .gap-text { font-size: 14px; line-height: 1.6; }
  .gap-action { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .action-item { display: flex; gap: 10px; margin-bottom: 0.75rem; align-items: flex-start; }
  .action-item:last-child { margin-bottom: 0; }
  .action-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .action-text { font-size: 14px; line-height: 1.6; }

  /* MODULE TABS */
  .modules-block { background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 1rem; margin-bottom: 1.25rem; }
  .modules-block-title { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .75rem; }
  .module-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .mod-tab { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); transition: all 0.2s; -webkit-appearance: none; white-space: nowrap; }
  .mod-tab.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
  .mod-tab:active { opacity: 0.8; }
  .module-panel { display: none; }
  .module-panel.active { display: block; }

  /* INTERVIEW SIMULATOR */
  .interview-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .interview-header { padding: 1rem; border-bottom: 1px solid var(--border); }
  .interview-q-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .interview-q-text { font-size: 15px; line-height: 1.6; font-weight: 400; }
  .interview-body { padding: 1rem; }
  .interview-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; resize: vertical; min-height: 100px; line-height: 1.6; -webkit-appearance: none; }
  .interview-textarea:focus { outline: none; border-color: var(--accent); }
  .interview-actions { display: flex; gap: 8px; margin-top: 0.75rem; align-items: center; flex-wrap: wrap; }
  .btn-submit { padding: 10px 18px; background: var(--accent); color: #0a0a0a; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; -webkit-appearance: none; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .speakup-btn { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: transparent; border: 1px solid var(--speakup); border-radius: 8px; color: var(--speakup); font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; -webkit-appearance: none; }
  .speakup-btn:active { background: rgba(74,158,255,0.1); }
  .speakup-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--speakup); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .eval-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 1rem; margin-top: 0.875rem; }
  .eval-score { font-family: 'Instrument Serif', serif; font-size: 32px; color: var(--accent); margin-bottom: 6px; }
  .eval-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
  .eval-section { margin-bottom: 0.75rem; }
  .eval-section:last-child { margin-bottom: 0; }
  .eval-section-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .eval-section-body { font-size: 13px; line-height: 1.65; color: var(--text); }
  .btn-next { padding: 10px 18px; background: var(--surface); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 0.75rem; -webkit-appearance: none; }
  .btn-next:active { border-color: var(--accent); color: var(--accent); }

  /* OUTREACH MODULE */
  .outreach-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; resize: vertical; min-height: 80px; line-height: 1.5; margin-bottom: 0.75rem; -webkit-appearance: none; }
  .outreach-input:focus { outline: none; border-color: var(--accent); }
  .outreach-result { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 1rem; margin-top: 0.75rem; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .copy-btn { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border2); color: var(--muted); border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 0.5rem; -webkit-appearance: none; }
  .company-chip { padding: 7px 12px; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); border-radius: 20px; font-size: 12px; cursor: pointer; -webkit-appearance: none; transition: all 0.2s; }
  .company-chip:active { border-color: var(--accent); color: var(--accent); }
  .copy-btn:active { border-color: var(--accent); color: var(--accent); }

  /* CV REWRITE MODULE */
  .cv-section-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: .875rem; }
  .cv-section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .75rem; }
  .cv-before-after { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: .75rem; }
  .cv-before, .cv-after { padding: .625rem; border-radius: 6px; }
  .cv-before { background: rgba(232,85,71,0.08); border: 1px solid rgba(232,85,71,0.2); }
  .cv-after { background: rgba(71,200,122,0.08); border: 1px solid rgba(71,200,122,0.2); }
  .cv-ba-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; margin-bottom: 4px; }
  .cv-ba-text { font-size: 13px; line-height: 1.5; }
  .cv-arrow { font-size: 16px; color: var(--muted); text-align: center; }
  .cv-summary-text { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: .75rem; padding: .75rem; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
  .cv-bullet-item { display: flex; gap: 10px; align-items: flex-start; padding: .625rem 0; border-bottom: 1px solid var(--border); }
  .cv-bullet-item:last-child { border-bottom: none; }
  .cv-bullet-num { width: 20px; height: 20px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); flex-shrink: 0; margin-top: 2px; }
  .cv-bullet-text { font-size: 13px; line-height: 1.6; flex: 1; }

  /* LOADING & NOTIF */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.88); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
  .loading-overlay.show { display: flex; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .notif { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.625rem 1rem; font-size: 13px; z-index: 200; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* OUTREACH FLOW */
  .branch-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: .75rem; }
  .branch-btn { display: flex; align-items: center; gap: 12px; padding: .875rem 1rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.2s; -webkit-appearance: none; width: 100%; }
  .branch-btn:hover, .branch-btn.active { border-color: var(--accent); background: #141200; }
  .branch-btn:active { opacity: 0.8; }
  .branch-icon { font-size: 20px; flex-shrink: 0; }
  .branch-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .branch-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .branch-btn-small { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; font-size: 12px; cursor: pointer; -webkit-appearance: none; }
  .branch-btn-small:active { border-color: var(--accent); color: var(--accent); }
  .outreach-step-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .75rem; }
  .outreach-step { animation: fadeUp 0.25s ease; }
  .hook-suggestion { background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; padding: .875rem; margin-bottom: .75rem; }
  .send-instruction-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: .875rem; font-size: 13px; line-height: 1.7; color: var(--muted); }
  .send-instruction-box strong { color: var(--text); }
  .company-chip.selected { border-color: var(--accent); color: var(--accent); }
  .company-chip.tier1 { border-color: var(--accent); color: var(--text); }

  /* PIPELINE */
  .pipeline-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  .pipeline-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .pipeline-table th { padding: .5rem .75rem; text-align: left; font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .pipeline-table td { padding: .625rem .75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .pipeline-row:last-child td { border-bottom: none; }
  .pipeline-company { font-weight: 500; font-size: 13px; white-space: nowrap; }
  .pipeline-muted { color: var(--muted); font-size: 11px; }
  .pipeline-action { color: var(--muted); font-size: 11px; max-width: 160px; }
  .pipeline-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .pipeline-date-active { color: var(--accent); }

<script>
const API_URL = '/api/chat';
const SPEAKUP_URL = 'https://speakup-delta.vercel.app';

const state = {
  cvText: '', messages: [], questionCount: 0,
  profileData: null, profileDone: false,
  interview: { questions: [], currentQ: 0, evaluations: [] }
};

// ── SYSTEM PROMPT ──
function buildSystem() {
  const cvBlock = state.cvText
    ? `\n\nCANDIDATE CV:\n"""\n${state.cvText}\n"""\n`
    : '';

  return `You are a straight-talking career diagnostic coach. Short messages — 2-3 sentences max per message. No corporate filler. No "certainly", "absolutely", "great question". Sound like a human. Plain words.
${cvBlock}

YOUR JOB IN THIS CONVERSATION:
Ask targeted questions, then generate a precise Career Intelligence Profile. The profile must be specific to THIS person — not generic advice that could apply to anyone.

PHASE 1 — CV SCAN (do this silently before asking anything):
If a CV was provided, read it carefully and identify:
- What role does this CV actually position them for right now? (not what their title says — what does the content signal?)
- What is ambiguous or missing? (e.g. title says one thing, responsibilities say another; education section blank or absent; gap between stated role and actual work done)
- What are 2-3 things you genuinely need to know that the CV doesn't answer?
Those become your dynamic questions. Do NOT ask things the CV already answers clearly.

PHASE 2 — DYNAMIC QUESTIONS (2-3 questions, based on what the CV left unclear):
Ask only what you actually need. Make each question specific to what you found in their CV.
Examples of good targeted questions (use these as a guide, not a script):
- "Your CV shows L&D work inside a financial services company — are you trying to stay in FS or move to a pure L&D role in a different industry? That completely changes how we position you."
- "Your title says Operations Manager but most of your bullets are about training teams. Which one do you actually want to do next — run operations, or build and run training programs?"
- "You've worked at [Company] for X years — are you looking to move to a similar-size company or are you targeting larger/smaller?"
- "Your CV mentions [specific achievement] briefly — tell me more about that. How many people, what outcome, over what timeframe?"
Do NOT ask generic questions like "what are your accomplishments" or "what's blocking you" if the CV already gives you enough to diagnose those.

PHASE 3 — SALARY & LOCATION (always ask, never skip, ask in one message):
"What's your current CTC, and what salary are you hoping for in this next role? Also — any hard location constraints or company types you'd rule out?"

Then respond honestly to their salary answer:
- Lateral move same role bigger company: 15-25% above current CTC
- Step-up with strong proof: 25-40% above current CTC  
- Career change to different industry: 0-15% above current CTC (reset is normal, tell them)
- Never suggest more than 40% jump unless genuinely exceptional credentials
- If they anchor too low: "You're on X. For [target role] at a [size] company, realistic is Y-Z. Are you undervaluing yourself?"
- If they anchor too high: "X isn't realistic in one move from your current CTC. Expect Y-Z."
- Always show the math. Make them feel the real number.

AFTER SALARY ANSWER: Generate the profile immediately. Do NOT ask more questions.

DEGREE / EDUCATION LOGIC — READ THIS CAREFULLY:
- If the CV does NOT mention degree status anywhere: do NOT assume graduation is a blocker. ATS can only filter what's written. A CV silent on degree passes most ATS filters. Do not flag this as a risk unless the user explicitly raised it.
- If the CV explicitly states no degree, or has a blank education section: then flag it — but only as one factor among others, not the primary blocker.
- If the user mentioned degree as a blocker in their answers: use their words, not your assumption.
- The real diagnostic question is: if the CV is silent on degree and they're still not getting calls, what ELSE explains it? Go there instead.

INDUSTRY RULES:
- Only list industries the user explicitly mentioned, or that directly and obviously match their CV content.
- Do NOT add EdTech, Healthcare, Retail, FMCG or any other industry as a guess. If it's not in the CV or their answers, leave it out.

BEFORE GENERATING THE PROFILE — connect everything:
- What does the CV signal vs what does the user want? Is there a gap?
- What did their answers reveal that the CV didn't show?
- What is the single most likely reason their search isn't converting? (Be specific — not "positioning" generically, but exactly what signal the CV is sending and why that's wrong for their target)
- Is the salary expectation realistic given their CTC and the type of move they're making?
- Are the companies you're recommending actually likely to hire this person given everything you now know?

COMPANY LIST RULES — THIS IS THE MOST IMPORTANT SECTION:
Before writing any company name, ask yourself: "Would a hiring manager at this company, seeing this person's CV, recognise it as directly relevant to a role they are hiring for?" If the answer is no or maybe, the company does not belong in tier1.

THE HIRING PROBABILITY TEST — apply to every company you consider:
1. Does this company operate in the same industry as the candidate's background? (BPO, travel, financial services, etc.)
2. Does this company have a dedicated training/L&D function at the size and level the candidate is targeting?
3. Is this company known to hire on experience rather than requiring specific credentials?
4. Is this company realistic for their salary band?
If a company fails 2 or more of these tests, it goes in avoid or is dropped entirely.

NEVER PUT IN TIER1 OR TIER2:
- Consumer tech startups (Byju's, Swiggy, Zomato, Razorpay, CRED, Zerodha, Meesho, PhonePe) — their training needs are specialist and unrelated to BPO/travel/FS backgrounds
- Product companies hiring generalist "culture" trainers — not the same as operations or process training
- Companies famous for being well-known but irrelevant to the candidate's industry
- Any company you are guessing about — if you are not confident they actively hire for this role type, leave them out

CORRECT APPROACH BY BACKGROUND:
- BPO/Contact Center background: Aegis, WNS, HGS, iEnergizer, Startek, Mphasis BPO, EXL Service, Sutherland, TTEC, Firstsource
- Travel/Hospitality background: MakeMyTrip, Thomas Cook, SOTC, Cox & Kings, Yatra, Cleartrip, OYO (ops roles), Club Mahindra
- Financial Services L&D: HDFC Bank, ICICI Bank, Kotak, Bajaj Finserv, Aditya Birla Capital, Muthoot, Shriram Group — mid-tier banks and NBFCs, not Big 4 consulting
- General corporate L&D targeting mid-size: companies with 500-2000 employees in their industry, not household names

- If degree is a known blocker: large MNCs with strict ATS (TCS, Infosys, Wipro, Accenture, Cognizant, Capgemini) go in avoid with specific reason.
- If degree is NOT a confirmed blocker: don't penalise them — put appropriate companies in tier1/tier2.
- tier1 = 3-4 specific company names with highest callback probability. Real names, not categories.
- tier2 = 2-3 specific company names worth trying, slightly harder fit. Real names.
- avoid = specific companies or types with specific reason why this person would get rejected there.
- next_actions must NOT say "rewrite CV" (the tool does that) or "search LinkedIn" (the Outreach tab does that). Actions should be: which specific company to approach first and how, what exact job title to search for, what to prepare for the most likely objection they will face.

OUTPUT ONLY THIS JSON IN EXACT TAGS:
<PROFILE_START>
{
  "name": "name or Professional",
  "target_role": "Specific role title",
  "target_industries": ["Industry 1", "Industry 2"],
  "profile_summary": "2-3 honest sentences. Plain language.",
  "hidden_assets": ["specific underplayed credential","another","another"],
  "market_value": {
    "current_ctc": "current CTC they told you",
    "realistic_target": "calculated range based on their CTC and move type",
    "ceiling": "best case number",
    "rationale": "One sentence — how you calculated this from their actual CTC"
  },
  "positioning_gaps": [
    {"type": "fix", "issue": "problem", "action": "exact action"},
    {"type": "note", "issue": "something to know", "action": "how to handle"},
    {"type": "risk", "issue": "real risk", "action": "how to mitigate"}
  ],
  "target_companies": {
    "tier1": ["specific real company name","specific real company name","specific real company name"],
    "tier2": ["specific real company name","specific real company name"],
    "avoid": ["Specific company or type — exact reason why this person would be rejected there"]
  },
  "why_not_converting": "Specific 2-3 sentence diagnosis tied to their exact answers. Name the actual problem.",
  "next_actions": ["Approach [specific company] first — search for [specific job title] on Naukri/LinkedIn and apply directly, not through Easy Apply","Second specific action","Third specific action — what to say when the most likely objection comes up"],
  "cv_rewrite_context": {
    "current_headline": "what their CV currently leads with based on their CV content",
    "target_headline": "what it should lead with — specific, achievement-led, written for their target role",
    "top_bullets": [
      "Achievement bullet using their actual numbers and context from CV/conversation",
      "Second bullet — different achievement, specific metric",
      "Third bullet",
      "Fourth bullet",
      "Fifth bullet"
    ],
    "summary_paragraph": "3 sentences. First sentence: who they are and their strongest credential. Second: what they have built or achieved. Third: what they are looking for and why they are ready."
  },
  "interview_questions": [
    {"q": "Behavioral question specific to their target role and background", "what_they_want": "what this question is really testing"},
    {"q": "Situation-based question for their industry", "what_they_want": "what this question is really testing"},
    {"q": "Career change question if applicable / strength question", "what_they_want": "what this question is really testing"},
    {"q": "Competency question based on their target role", "what_they_want": "what this question is really testing"},
    {"q": "Closing question — future plans / why this role", "what_they_want": "what this question is really testing"}
  ],
  "outreach_context": {
    "role": "their target role",
    "background_summary": "2 sentence summary of their background for outreach context",
    "value_proposition": "what specific value they bring — one sentence"
  }
}
<PROFILE_END>`;
}

// ── API ──
async function callAPI(messages, maxTokens) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system: buildSystem(), max_tokens: maxTokens || 300 })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
  return (await r.json()).content;
}

async function callAPIRaw(systemPrompt, userContent, maxTokens) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: userContent }],
      system: systemPrompt,
      max_tokens: maxTokens || 600
    })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
  return (await r.json()).content;
}

// ── PDF ──
async function readPDF(file) {
  if (!window.pdfjsLib) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(x => x.str).join(' ') + '\n';
  }
  return text.trim();
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ── UI ──
function setStage(stage) {
  const map = { upload:[1,'Upload CV'], chat:[2,'Diagnostic'], profile:[3,'Your Profile'] };
  const [n, label] = map[stage];
  document.querySelectorAll('.stage-dot').forEach((d,i) => {
    d.className = 'stage-dot';
    if (i+1 < n) d.classList.add('done');
    else if (i+1 === n) d.classList.add('active');
  });
  document.getElementById('stage-label').textContent = label;
  document.getElementById('progress').style.width = `${(n/3)*100}%`;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${stage}`).classList.add('active');
  if (stage === 'chat') setTimeout(scrollBottom, 100);
  if (stage === 'profile') {
    // Lock chat permanently — profile is done
    const inputArea = document.getElementById('chat-input-area');
    if (inputArea) inputArea.style.display = 'none';
    document.getElementById('send-btn').disabled = true;
    state.profileDone = true;
  }
}

function showLoading(t) { document.getElementById('loading-text').textContent = t||''; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showTyping() { document.getElementById('typing').classList.add('show'); scrollBottom(); }
function hideTyping() { document.getElementById('typing').classList.remove('show'); }
function scrollBottom() { const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; }
function notify(text, ms) { const n = document.getElementById('notif'); n.textContent = text; n.classList.add('show'); setTimeout(()=>n.classList.remove('show'), ms||3000); }

function addMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const typing = document.getElementById('typing');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = role==='ai'?'H':'Y';
  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  msg.appendChild(av); msg.appendChild(bubble);
  container.insertBefore(msg, typing);
  setTimeout(scrollBottom, 50);
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ── CHAT ──
async function startChat() {
  setStage('chat');
  document.getElementById('send-btn').disabled = false;
  showTyping();
  const opening = state.cvText
    ? 'I have uploaded my CV. Please scan it and ask me your targeted questions.'
    : 'No CV uploaded. Please ask me what you need to know.';
  state.messages = [{ role: 'user', content: opening }];
  try {
    const reply = await callAPI(state.messages, 400);
    hideTyping();
    if (reply.includes('<PROFILE_START>')) { processProfile(reply); return; }
    addMessage('ai', reply);
    state.messages.push({ role: 'assistant', content: reply });
    state.questionCount = 1;
  } catch(err) {
    hideTyping();
    addMessage('ai', `Connection error: ${err.message}. Refresh and try again.`);
  }
}

async function sendMessage() {
  // Hard block — if profile is done, ignore all input
  if (state.profileDone) return;

  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);
  state.messages.push({ role: 'user', content: text });
  state.questionCount++;
  showTyping();
  try {
    // After salary answer (typically 3rd-4th exchange), nudge profile generation
    // but let the AI decide — it will output PROFILE_START when ready
    const msgs = state.questionCount >= 3
      ? [...state.messages, { role:'user', content:'[If you have asked your targeted questions AND received the salary/location answer, generate the Career Intelligence Profile JSON now. If you still need the salary answer, ask it first.]' }]
      : state.messages;
    const tokenLimit = state.questionCount >= 3 ? 3500 : 350;
    const reply = await callAPI(msgs, tokenLimit);
    hideTyping();
    if (reply.includes('<PROFILE_START>')) {
      addMessage('ai', "Got everything I need. Building your profile now...");
      await sleep(800);
      processProfile(reply);
    } else {
      // Strip any accidental [bracketed system notes] from AI reply before showing
      const cleanReply = reply.replace(/\[.*?\]/g, '').trim();
      addMessage('ai', cleanReply);
      state.messages.push({ role:'assistant', content: reply });
      document.getElementById('send-btn').disabled = false;
    }
  } catch(err) {
    hideTyping();
    addMessage('ai', `Error: ${err.message}. Try again.`);
    document.getElementById('send-btn').disabled = false;
  }
}

// ── PROFILE ──
function processProfile(raw) {
  try {
    const match = raw.match(/<PROFILE_START>([\s\S]*?)<PROFILE_END>/);
    if (!match) throw new Error('no tags');
    const data = JSON.parse(match[1].trim());
    state.profileData = data;
    if (data.interview_questions) state.interview.questions = data.interview_questions;
    showLoading('Building your Career Intelligence Profile...');
    setTimeout(() => { hideLoading(); renderProfile(data); setStage('profile'); }, 1800);
  } catch(err) {
    console.error(err); regenProfile();
  }
}

async function regenProfile() {
  showLoading('Generating your profile...');
  try {
    const msgs = [...state.messages, { role:'user', content:'Generate my Career Intelligence Profile JSON now. Output ONLY the JSON inside the tags.' }];
    const reply = await callAPI(msgs, 3500);
    hideLoading();
    const match = reply.match(/<PROFILE_START>([\s\S]*?)<PROFILE_END>/);
    if (match) {
      const d = JSON.parse(match[1].trim());
      state.profileData = d;
      if (d.interview_questions) state.interview.questions = d.interview_questions;
      renderProfile(d); setStage('profile');
    } else notify('Could not generate profile. Keep talking.');
  } catch(err) { hideLoading(); notify('Error. Please refresh.'); }
}

// ── RENDER PROFILE ──
// Profile structure: header → MODULE TABS (first thing) → diagnosis details (collapsed by default on mobile)

        <div class="target-role-card">

        </button>

      <div class="profile-section">
        <div class="ps-header"><span class="ps-icon">💰</span><span class="ps-title">Your Real Market Value</span></div>

function toggleDiagnosis(el) {
  const diag = document.getElementById('full-diagnosis');
  const visible = diag.style.display !== 'none';
  diag.style.display = visible ? 'none' : 'block';
  el.textContent = visible ? '▼ See full diagnosis' : '▲ Hide diagnosis';
}

function switchModule(name, btn) {
  if (btn.classList.contains('mod-locked')) {
    notify('Complete your outreach first. Mark a company as "Replied" or "Call scheduled" to unlock Interview Prep.');
    return;
  }
  document.querySelectorAll('.mod-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('mod-'+name);
  if (panel) {
    panel.classList.add('active');
    // Re-render pipeline on tab switch so it stays fresh
    if (name === 'pipeline' && state.profileData) {
      panel.innerHTML = renderPipelineHTML();
    }
  }
}

// ── INTERVIEW MODULE ──
function renderInterviewModule(d) {
  const qs = state.interview.questions;
  if (!qs || qs.length === 0) return `<p style="color:var(--muted);font-size:14px">No questions available.</p>`;
  return `
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.875rem">5 questions tailored to your target role. Answer each one, get scored, then practice speaking it in SpeakUp.</p>
    <div class="interview-wrap" id="interview-wrap">
      ${renderQuestion(0)}
    </div>`;
}

function renderQuestion(idx) {
  const qs = state.interview.questions;
  if (idx >= qs.length) return renderInterviewComplete();
  const q = qs[idx];
  const ev = state.interview.evaluations[idx];
  return `
    <div class="interview-header">
      <div class="interview-q-num">Question ${idx+1} of ${qs.length}</div>
      <div class="interview-q-text">${q.q}</div>
      ${q.what_they_want ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic">Testing: ${q.what_they_want}</div>` : ''}
    </div>
    <div class="interview-body">
      ${ev ? renderEval(ev, idx) : `
        <textarea class="interview-textarea" id="interview-answer" placeholder="Type your answer here..."></textarea>
        <div class="interview-actions">
          <button class="btn-submit" id="submit-answer-btn" onclick="submitAnswer(${idx})">Submit Answer</button>
          <a class="speakup-btn" href="${SPEAKUP_URL}?q=${encodeURIComponent(q.q)}" target="_blank">
            <div class="speakup-dot"></div>Practice in SpeakUp
          </a>
        </div>`}
    </div>`;
}

function renderEval(ev, idx) {
  const qs = state.interview.questions;
  return `
    <div class="eval-card">
      <div class="eval-label">Your Score</div>
      <div class="eval-score">${ev.score}/100</div>
      <div class="eval-section"><div class="eval-section-title">What you did well</div><div class="eval-section-body">${ev.strengths}</div></div>
      <div class="eval-section"><div class="eval-section-title">What was missing</div><div class="eval-section-body">${ev.gaps}</div></div>
      <div class="eval-section"><div class="eval-section-title">Model answer</div><div class="eval-section-body">${ev.model_answer}</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem">
      ${idx < qs.length - 1
        ? `<button class="btn-next" onclick="nextQuestion(${idx+1})">Next Question →</button>`
        : `<button class="btn-next" onclick="showInterviewComplete()">See Results →</button>`}
      <a class="speakup-btn" href="${SPEAKUP_URL}?q=${encodeURIComponent(qs[idx].q)}" target="_blank">
        <div class="speakup-dot"></div>Practice speaking this
      </a>
    </div>`;
}

function renderInterviewComplete() {
  const avg = Math.round(state.interview.evaluations.reduce((s,e)=>s+e.score,0) / state.interview.evaluations.length);
  return `
    <div class="interview-header">
      <div class="interview-q-num">All done</div>
      <div class="interview-q-text">You completed all 5 questions.</div>
    </div>
    <div class="interview-body">
      <div class="eval-card">
        <div class="eval-label">Average Score</div>
        <div class="eval-score">${avg}/100</div>
        <div class="eval-section-body" style="color:var(--muted);font-size:13px">
          ${avg >= 80 ? "Strong. Focus on delivery now — practice speaking each answer in SpeakUp." :
            avg >= 60 ? "Decent foundation. Review model answers for questions where you scored under 70." :
            "More practice needed. Go through the model answers, then redo your weakest 2 questions."}
        </div>
      </div>
      <a class="speakup-btn" style="margin-top:.75rem;display:inline-flex" href="${SPEAKUP_URL}" target="_blank">
        <div class="speakup-dot"></div>Continue in SpeakUp
      </a>
    </div>`;
}

async function submitAnswer(idx) {
  const answer = document.getElementById('interview-answer')?.value?.trim();
  if (!answer) { notify('Write your answer first.'); return; }
  const btn = document.getElementById('submit-answer-btn');
  if (btn) btn.disabled = true;
  showLoading('Evaluating your answer...');
  const q = state.interview.questions[idx];
  const d = state.profileData;
  const system = `You are a rigorous but fair interview coach. Evaluate this candidate's answer to an interview question for a ${d.target_role} role.
Candidate background: ${d.outreach_context?.background_summary || d.profile_summary}
Respond ONLY with this JSON, nothing else:
{"score": number 0-100, "strengths": "1-2 sentences", "gaps": "1-2 sentences on what was missing", "model_answer": "strong 3-4 sentence answer using their actual background"}`;
  try {
    const raw = await callAPIRaw(system, `Question: ${q.q}\n\nAnswer: ${answer}`, 800);
    hideLoading();
    const ev = JSON.parse(raw.replace(/```json|```/g,'').trim());
    state.interview.evaluations[idx] = ev;
    document.getElementById('interview-wrap').innerHTML = renderQuestion(idx);
  } catch(err) {
    hideLoading(); notify('Could not evaluate. Try again.');
    if (btn) btn.disabled = false;
  }
}

function nextQuestion(idx) {
  state.interview.currentQ = idx;
  document.getElementById('interview-wrap').innerHTML = renderQuestion(idx);
}

function showInterviewComplete() {
  document.getElementById('interview-wrap').innerHTML = renderInterviewComplete();
}

// ── OUTREACH MODULE ──
// State for current outreach session
const outreachState = { company: '', branch: '', hook: '', generatedMsg: '' };

function renderOutreachModule(d) {
  const tier1 = (d.target_companies.tier1||[]);

async function startOutreach(company, btn) {
  outreachState.company = company;
  outreachState.branch = '';
  outreachState.hook = '';
  outreachState.generatedMsg = '';

  document.querySelectorAll('.company-chip').forEach(b => { b.classList.remove('selected'); });
  btn.classList.add('selected');

  document.getElementById('company-name-display').textContent = company;
  document.getElementById('outreach-flow').style.display = 'block';
  document.getElementById('outreach-step1').style.display = 'block';
  document.getElementById('outreach-step2').style.display = 'none';
  document.getElementById('outreach-step3').style.display = 'none';

  document.getElementById('outreach-flow').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function selectBranch(branch) {
  outreachState.branch = branch;
  document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.branch-btn').classList.add('active');

  // Pre-fill hook from CV data
  showLoading('Finding your strongest hook...');
  const d = state.profileData;
  const hookSystem = `You are identifying the single strongest hook for a cold outreach message.

Candidate background: ${d.outreach_context?.background_summary || d.profile_summary}
Target role: ${d.target_role}
Target company: ${outreachState.company}
Hidden assets: ${(d.hidden_assets||[]).join(', ')}
Achievement bullets from CV: ${(d.cv_rewrite_context?.top_bullets||[]).slice(0,3).join(' | ')}

Identify ONE specific result or achievement from their background that is most directly relevant to what ${outreachState.company} cares about.
Output ONLY: a single sentence starting with a past-tense verb. Example: "Built contact center training infrastructure for 65 agents across 2 sites, cutting ramp time from 12 to 7 weeks."
No preamble. No explanation. Just the one sentence.`;

  try {
    const hook = await callAPIRaw(hookSystem, `Find the best hook for ${outreachState.company}`, 120);
    hideLoading();
    outreachState.hook = hook.trim();
    document.getElementById('hook-text').textContent = outreachState.hook;
    document.getElementById('hook-edit').value = outreachState.hook;
    document.getElementById('outreach-step1').style.display = 'none';
    document.getElementById('outreach-step2').style.display = 'block';
  } catch(err) {
    hideLoading();
    document.getElementById('hook-text').textContent = 'Describe your strongest relevant result in one sentence.';
    document.getElementById('hook-edit').value = '';
    document.getElementById('outreach-step1').style.display = 'none';
    document.getElementById('outreach-step2').style.display = 'block';
  }
}

async function confirmHook() {
  const editedHook = document.getElementById('hook-edit').value.trim();
  if (!editedHook) { notify('Add your hook first.'); return; }
  outreachState.hook = editedHook;

  showLoading('Writing your message...');
  const d = state.profileData;

  let branchInstructions = '';
  let sendInstructions = '';

  if (outreachState.branch === 'live') {
    branchInstructions = `This person has found a live job posting at ${outreachState.company}. Write a message that:
1. Opens with a specific observation about the company or role (not "I saw your job posting")
2. Uses this hook as the key proof point: "${outreachState.hook}"
3. Mentions they applied through the portal and this message is to ensure a human sees it
4. Ends with: "Would a 5-minute call make sense, or should I send across anything else?"
Keep it under 100 words. Natural, direct tone.`;
    sendInstructions = `<strong>Apply first</strong> → then find the <strong>Hiring Manager or L&D Head</strong> on LinkedIn (search: "${outreachState.company} Training Manager" or "Head L&D ${outreachState.company}"). Send as a connection request note. The message confirms your application — it gets a human to see it before the ATS buries it.`;

  } else if (outreachState.branch === 'cold') {
    branchInstructions = `This person is reaching out cold — no live job posting. Write a message that:
1. Opens with a specific, researched observation about ${outreachState.company}'s current situation or growth
2. Uses this hook as the proof point: "${outreachState.hook}"
3. Does NOT ask for a job — asks for a perspective or a brief conversation
4. Ends with: "Would a 15-minute call make sense?"
Keep it under 120 words. Peer-to-peer tone, not job-seeker tone.`;
    sendInstructions = `Find the <strong>VP Training, Head of L&D, or Operations Director</strong> at ${outreachState.company} on LinkedIn (search: "Head Learning ${outreachState.company}" or "VP Operations ${outreachState.company}"). Send as a <strong>connection request with this note</strong> (LinkedIn limits connection notes to 300 characters — use the short version). If they accept without replying, follow up in 3 days with one sentence asking if they have 15 minutes.`;

  } else {
    branchInstructions = `This person has a mutual connection at ${outreachState.company}. Write a message to send to THEIR MUTUAL CONTACT (not the hiring manager) asking for a warm introduction. The message should:
1. Reference the mutual contact by name if possible, or use "[Name]"
2. Briefly explain what they're looking for at ${outreachState.company}
3. Use this as the reason they'd be relevant: "${outreachState.hook}"
4. Ask for an introduction — specific, easy, low-pressure
Keep it under 80 words. Friendly tone, not formal.`;
    sendInstructions = `Send this to your <strong>mutual contact</strong> first — not to the hiring manager. A warm introduction converts at 5x a cold message. Once they make the intro, follow up with a separate note to the hiring manager referencing the introduction.`;
  }

  const system = `You are writing a highly personalised outreach message for a mid-career professional.
Candidate: ${d.outreach_context?.background_summary || d.profile_summary}
Target role: ${d.target_role}
Target company: ${outreachState.company}

${branchInstructions}

Output ONLY the message text. No subject line. No preamble. No explanation.`;

  try {
    const msg = await callAPIRaw(system, `Write the outreach message now.`, 300);
    hideLoading();
    outreachState.generatedMsg = msg.trim();

    document.getElementById('send-instructions').innerHTML = `<div class="send-instruction-box">${sendInstructions}</div>`;
    document.getElementById('outreach-text').textContent = outreachState.generatedMsg;
    document.getElementById('outreach-step2').style.display = 'none';
    document.getElementById('outreach-step3').style.display = 'block';
  } catch(err) {
    hideLoading();
    notify('Error generating message. Try again.');
  }
}

function markSent() {
  document.getElementById('sent-confirm').style.display = 'block';
  document.getElementById('sent-confirm').scrollIntoView({ behavior: 'smooth' });
}

function logSent(variant) {
  const company = outreachState.company;
  const branch = outreachState.branch;
  const today = new Date();
  const followUpDate = new Date(today.getTime() + 5 * 24 * 60 * 60 * 1000);
  const followUpStr = followUpDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

  // Add to pipeline
  addToPipeline({
    company,
    status: 'Message sent',
    lastAction: `Sent ${variant.replace(/-/g,' ')} (${branch})`,
    nextStepBy: followUpStr,
    nextAction: 'Check for reply — follow up if no response',
    daysAgo: 0
  });

  document.getElementById('sent-confirm').innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--success);border-radius:8px;padding:.875rem;margin-top:.5rem">
      <p style="font-size:13px;color:var(--success);font-weight:500;margin-bottom:.25rem">✓ Logged — message sent to ${company}</p>
      <p style="font-size:12px;color:var(--muted)">Follow-up reminder set for ${followUpStr}. Check your Pipeline tab to track progress.</p>
      <button class="btn-next" style="margin-top:.5rem" onclick="switchModuleByName('pipeline')">View Pipeline →</button>
    </div>`;

  // Set 5-day reminder check
  setTimeout(() => {
    notify(`Did ${company} reply? Check your pipeline.`, 6000);
  }, 100);

  notify('Logged ✓ Check Pipeline for follow-up date');
}

function copyOutreach() {
  const text = document.getElementById('outreach-text')?.textContent;
  if (text) navigator.clipboard.writeText(text).then(()=>notify('Copied ✓'));
}

function switchModuleByName(name) {
  const tabMap = { cv: 0, outreach: 1, pipeline: 2, interview: 3 };
  const tabs = document.querySelectorAll('.mod-tab');
  const idx = tabMap[name];
  if (tabs[idx]) switchModule(name, tabs[idx]);
}

// ── PIPELINE MODULE ──
let pipelineData = [];

function addToPipeline(entry) {
  const existing = pipelineData.findIndex(p => p.company === entry.company);
  if (existing >= 0) {
    pipelineData[existing] = { ...pipelineData[existing], ...entry };
  } else {
    pipelineData.push(entry);
  }
  // Re-render pipeline if visible
  const panel = document.getElementById('mod-pipeline');
  if (panel && panel.classList.contains('active')) {
    panel.innerHTML = renderPipelineHTML();
  }
}

function renderPipelineModule(d) {
  // Pre-populate with target companies if pipeline is empty
  if (pipelineData.length === 0) {
    const companies = [...(d.target_companies?.tier1||[]), ...(d.target_companies?.tier2||[])];
    companies.slice(0, 6).forEach(c => {
      pipelineData.push({
        company: c,
        status: 'Not started',
        lastAction: '—',
        nextStepBy: '—',
        nextAction: 'Go to Outreach tab to start',
        daysAgo: null
      });
    });
  }
  return renderPipelineHTML();
}

function renderPipelineHTML() {
  const statusColors = {
    'Not started': 'var(--muted)',
    'Message sent': 'var(--accent)',
    'Replied': 'var(--success)',
    'Call scheduled': 'var(--success)',
    'Applied': '#4a9eff',
    'No response — follow up': 'var(--danger)',
    'Closed': 'var(--border2)'
  };

  const statuses = ['Not started','Message sent','Applied','Replied','Call scheduled','No response — follow up','Closed'];
  const statusOptions = statuses.map(s => `<option value="${s}">${s}</option>`).join('');

  const rows = pipelineData.map((p, i) => {
    const color = statusColors[p.status] || 'var(--muted)';
    const isActive = p.status !== 'Not started' && p.status !== 'Closed';
    return `
      <tr class="pipeline-row" data-idx="${i}">
        <td class="pipeline-company">${p.company}</td>
        <td>
          <select class="pipeline-status-select" onchange="updatePipelineStatus(${i}, this.value)" style="color:${color}">
            ${statuses.map(s => `<option value="${s}"${s===p.status?' selected':''}>${s}</option>`).join('')}
          </select>
        </td>
        <td class="pipeline-muted">${p.lastAction}</td>
        <td class="pipeline-date${isActive ? ' pipeline-date-active' : ''}">${p.nextStepBy}</td>
        <td class="pipeline-muted pipeline-action">${p.nextAction}</td>
      </tr>`;
  }).join('');

  return `
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem">Track every company you are pursuing. Update status after each action. The table sorts by next step date — your most urgent follow-up is always at the top.</p>

    <div class="pipeline-table-wrap">
      <table class="pipeline-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Status</th>
            <th>Last Action</th>
            <th>Follow Up By</th>
            <th>Next Action</th>
          </tr>
        </thead>
        <tbody id="pipeline-tbody">${rows}</tbody>
      </table>
    </div>

    <div style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-secondary" onclick="switchModuleByName('outreach')" style="font-size:12px">+ Start outreach for a company</button>
      <span style="font-size:11px;color:var(--muted);align-self:center">Interview Prep unlocks when you mark a company as "Call scheduled"</span>
    </div>`;
}

function updatePipelineStatus(idx, newStatus) {
  if (!pipelineData[idx]) return;
  pipelineData[idx].status = newStatus;
  pipelineData[idx].lastAction = `Status updated to: ${newStatus}`;

  const today = new Date();
  if (newStatus === 'Message sent') {
    const followUp = new Date(today.getTime() + 5 * 24 * 60 * 60 * 1000);
    pipelineData[idx].nextStepBy = followUp.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    pipelineData[idx].nextAction = 'Check for reply — if none, send follow-up';
  } else if (newStatus === 'Replied') {
    pipelineData[idx].nextStepBy = today.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    pipelineData[idx].nextAction = 'Reply and propose a 15-min call';
    // Unlock interview prep
    unlockInterviewPrep();
    notify('Reply logged! Interview Prep is now unlocked.');
  } else if (newStatus === 'Call scheduled') {
    pipelineData[idx].nextStepBy = today.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    pipelineData[idx].nextAction = 'Prepare call brief — see Interview Prep tab';
    unlockInterviewPrep();
    notify('Call logged! Interview Prep is now unlocked.');
  } else if (newStatus === 'No response — follow up') {
    const followUp = new Date(today.getTime() + 2 * 24 * 60 * 60 * 1000);
    pipelineData[idx].nextStepBy = followUp.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    pipelineData[idx].nextAction = 'Send follow-up — go to Outreach tab';
  }

  // Re-render
  const tbody = document.getElementById('pipeline-tbody');
  if (tbody) {
    const panel = document.getElementById('mod-pipeline');
    if (panel) panel.innerHTML = renderPipelineHTML();
  }
}

function unlockInterviewPrep() {
  const tab = document.getElementById('tab-interview');
  if (tab) {
    tab.classList.remove('mod-locked');
    tab.innerHTML = '<span class="step-num">4</span> Interview Prep';
  }
}

// ── CV REWRITE MODULE ──
function renderCVRewriteModule(d) {
  const cv = d.cv_rewrite_context;

  // If AI didn't generate cv_rewrite_context (older session), show generate button
  if (!cv || !cv.top_bullets) {
    return `
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.875rem">Generate a rewritten CV section leading with your training expertise — ready to copy into your actual CV.</p>
      <button class="btn-submit" onclick="generateCVRewrite()">Generate My CV Rewrite</button>
      <div id="cv-rewrite-result" style="display:none"></div>`;
  }

  return renderCVRewriteOutput(cv);
}

function renderCVRewriteOutput(cv) {
  const bullets = (cv.top_bullets || []).map((b, i) => `
    <div class="cv-bullet-item">
      <div class="cv-bullet-num">${i+1}</div>
      <div class="cv-bullet-text">${b}</div>
    </div>`).join('');

  return `
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1rem">Your CV rewritten to lead with training expertise. Copy these directly into your CV. Each bullet is written for a hiring manager scanning for a Training Manager, not an Operations Manager.</p>

    <div class="cv-section-block">
      <div class="cv-section-label">Headline — replace your current title with this</div>
      <div class="cv-before-after">
        <div class="cv-before">
          <div class="cv-ba-label">Current</div>
          <div class="cv-ba-text">${cv.current_headline || '—'}</div>
        </div>
        <div class="cv-arrow">→</div>
        <div class="cv-after">
          <div class="cv-ba-label">Rewritten</div>
          <div class="cv-ba-text">${cv.target_headline || '—'}</div>
        </div>
      </div>
      <button class="copy-btn" onclick="copyText('${(cv.target_headline||'').replace(/'/g,"\'")}')">Copy headline</button>
    </div>

    <div class="cv-section-block">
      <div class="cv-section-label">Summary paragraph — replaces your current opening</div>
      <div class="cv-summary-text">${cv.summary_paragraph || '—'}</div>
      <button class="copy-btn" onclick="copyText(\`${(cv.summary_paragraph||'').replace(/`/g,"\`")}\`)">Copy summary</button>
    </div>

    <div class="cv-section-block">
      <div class="cv-section-label">Top 5 achievement bullets — lead your experience section with these</div>
      ${bullets}
      <button class="copy-btn" style="margin-top:.75rem" onclick="copyAllBullets()">Copy all bullets</button>
    </div>

    <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.875rem;margin-top:.75rem">
      <p style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">How to beat the ATS degree filter</p>
      <p style="font-size:12px;color:var(--muted);line-height:1.7">ATS systems can only filter what's written. If your CV doesn't say "no degree", it has nothing to reject. <strong style="color:var(--text)">Do not mention degree status anywhere on your CV.</strong> Lead with years of experience, certifications, and these achievement bullets. Most ATS systems will pass a CV scoring 70%+ on other criteria even if the degree field is blank.<br><br>If a job application has a knockout question "Do you have a degree? Yes/No" — skip that application and approach the company directly through LinkedIn instead. That bypasses the ATS entirely.<br><br>When asked in an interview: <em style="color:var(--text)">"I've built and run training programs across 3 countries over 15 years — I'm happy to walk you through the outcomes."</em> Don't apologise. Redirect to proof.</p>
    </div>

    <div style="margin-top:.875rem;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-submit" onclick="downloadCVDoc()" style="flex:1">⬇ Download Word Document</button>
      <button class="btn-secondary" onclick="copyFullCVSection()" style="flex:1">Copy All Text</button>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:.5rem;line-height:1.5">Single-column, Arial font, ATS-safe. Update the contact details and paste your existing experience section below the achievements.</p>`;
}

async function generateCVRewrite() {
  showLoading('Rewriting your CV...');
  const d = state.profileData;
  const system = `You are rewriting a professional's CV to position them for a career transition.

Current background: ${d.outreach_context?.background_summary || d.profile_summary}
Target role: ${d.target_role}
Hidden assets identified: ${(d.hidden_assets||[]).join(', ')}
Value proposition: ${d.outreach_context?.value_proposition || ''}

Generate a CV rewrite in this EXACT JSON format, nothing else:
{
  "current_headline": "what their CV likely leads with based on their background",
  "target_headline": "rewritten headline for target role — specific and achievement-led",
  "top_bullets": [
    "Achievement bullet 1 — starts with strong verb, includes specific number or metric",
    "Achievement bullet 2",
    "Achievement bullet 3",
    "Achievement bullet 4",
    "Achievement bullet 5"
  ],
  "summary_paragraph": "3-sentence summary leading with training expertise, not operations. Plain language. No buzzwords."
}`;

  try {
    const raw = await callAPIRaw(system, 'Generate the CV rewrite now.', 1000);
    hideLoading();
    const cv = JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,'').trim());
    state.profileData.cv_rewrite_context = cv;
    document.getElementById('cv-rewrite-result').style.display = 'block';
    document.getElementById('cv-rewrite-result').innerHTML = renderCVRewriteOutput(cv);
  } catch(err) {
    hideLoading();
    notify('Could not generate rewrite. Try again.');
  }
}

function copyFullCVSection() {
  const cv = state.profileData?.cv_rewrite_context;
  if (!cv) return;
  const bullets = (cv.top_bullets||[]).map(b => `• ${b}`).join('\n');
  const full = `HEADLINE\n${cv.target_headline||''}\n\nSUMMARY\n${cv.summary_paragraph||''}\n\nKEY ACHIEVEMENTS\n${bullets}`;
  navigator.clipboard.writeText(full).then(() => notify('Full CV section copied ✓'));
}

async function downloadCVDoc() {
  const d = state.profileData;
  if (!d?.cv_rewrite_context) { notify('Generate CV Rewrite first.'); return; }
  showLoading('Generating your Word document...');
  try {
    const response = await fetch('/api/generate-cv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cv: d.cv_rewrite_context, profile: { name: d.name } })
    });
    if (!response.ok) throw new Error('Generation failed');
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `HireOS_CV_${(d.name||'Professional').replace(/\s+/g,'_')}.docx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    hideLoading();
    notify('CV downloaded ✓');
  } catch(err) {
    hideLoading();
    notify('Download failed. Copy the text instead.');
  }
}

function copyAllBullets() {
  const cv = state.profileData?.cv_rewrite_context;
  if (!cv?.top_bullets) return;
  const text = cv.top_bullets.map((b,i) => `• ${b}`).join('\n');
  navigator.clipboard.writeText(text).then(() => notify('All bullets copied ✓'));
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => notify('Copied ✓'));
}

// ── HIDDEN JOBS MODULE ──
function renderHiddenJobsModule(d) {
  return `
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.875rem">Most jobs are never posted. Companies in motion — new funding, new cities, new products — often hire before the job goes live. Get in before the queue forms.</p>
    <div class="profile-section" style="margin-bottom:.875rem">
      <div class="ps-header"><span class="ps-icon">💡</span><span class="ps-title">The Approach</span></div>
      <div class="ps-body">
        ${[
          ['Find companies in motion','Search LinkedIn, MoneyControl, YourStory for recent funding rounds, city expansions, executive hires. These signal headcount growth before jobs are posted.'],
          ['Understand their current friction','Read recent news and Glassdoor reviews. What problem are they solving right now? What does someone in your target role help fix?'],
          ['Arrive with value, not a CV','Find the hiring manager on LinkedIn. Send a message that shows you understand their situation and explains how your background is relevant.'],
          ['Skip HR for the first message','HR manages posted-job pipelines. The VP or Director of your target department decides whether to create a role. Go there first.']
        ].map(([title,text],i)=>`
          <div class="action-item">
            <div class="action-num">${i+1}</div>
            <div class="action-text"><strong style="color:var(--text)">${title}.</strong> ${text}</div>
          </div>`).join('')}
      </div>
    </div>
    <textarea class="outreach-input" id="hidden-company-input" placeholder="Paste a company name or recent news about them..."></textarea>
    <button class="btn-submit" onclick="generateProofOfWork()">Generate Proof-of-Work Outreach</button>
    <div id="pow-result" style="display:none">
      <div class="outreach-result" id="pow-text"></div>
      <button class="copy-btn" onclick="copyPOW()">Copy message</button>
    </div>`;
}

async function generateProofOfWork() {
  const input = document.getElementById('hidden-company-input')?.value?.trim();
  if (!input) { notify('Paste company info first.'); return; }
  showLoading('Building your Proof of Work outreach...');
  const d = state.profileData;
  const system = `You are helping a job seeker approach a company that has not posted a job yet.
Candidate: ${d.outreach_context?.background_summary || d.profile_summary}
Target role: ${d.target_role}
Their key value: ${d.outreach_context?.value_proposition || ''}
Write a short outreach message (6-8 sentences) to the relevant VP or department head.
1. Open with a specific researched observation about the company
2. Identify one problem or growth challenge they are likely facing
3. Connect that directly to something in the candidate's background
4. End with a specific easy ask — "would a 15-minute call make sense?"
No bullet points. No filler. Sound like a thoughtful professional.
Output only the message. Nothing else.`;
  try {
    const msg = await callAPIRaw(system, `Company context: ${input}`, 450);
    hideLoading();
    document.getElementById('pow-text').textContent = msg;
    document.getElementById('pow-result').style.display = 'block';
  } catch(err) { hideLoading(); notify('Error. Try again.'); }
}

function copyPOW() {
  const text = document.getElementById('pow-text')?.textContent;
  if (text) navigator.clipboard.writeText(text).then(()=>notify('Copied ✓'));
}

// ── HOME / CLEAR ──
function goHome() {
  if (state.profileDone || state.questionCount > 0) {
    if (!confirm('Start over? Your current session will be cleared.')) return;
  }
  startOver();
}

function clearFile() {
  state.cvText = '';
  document.getElementById('file-selected').classList.remove('show');
  document.getElementById('file-name').textContent = '—';
  document.getElementById('file-size').textContent = '—';
  document.getElementById('cv-file-input').value = '';
  document.getElementById('start-btn').disabled = true;
  notify('CV removed');
}

// ── START OVER ──
function startOver() {
  Object.assign(state, { cvText:'', messages:[], questionCount:0, profileData:null, profileDone:false, interview:{ questions:[], currentQ:0, evaluations:[] } });
  pipelineData = [];
  Object.assign(outreachState, { company:'', branch:'', hook:'', generatedMsg:'' });
  document.getElementById('chat-messages').innerHTML = `<div class="typing-indicator" id="typing"><div class="typing-avatar">H</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('file-selected').classList.remove('show');
  document.getElementById('start-btn').disabled = true;
  document.getElementById('chat-input-area').style.display = '';
  setStage('upload');
}

// ── UPLOAD ──
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('cv-file-input');
const startBtn   = document.getElementById('start-btn');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (file.size > 5*1024*1024) { notify('File too large. Max 5MB.'); return; }
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-size').textContent = `${(file.size/1024).toFixed(0)} KB`;
  document.getElementById('file-selected').classList.add('show');
  showLoading('Reading your CV...');
  try {
    state.cvText = await readPDF(file);
    hideLoading(); startBtn.disabled = false;
    notify(state.cvText ? 'CV read ✓' : 'CV uploaded');
  } catch(err) {
    hideLoading(); startBtn.disabled = false; state.cvText = '';
    notify('Could not read CV. Continuing without it.');
  }
}

startBtn.addEventListener('click', startChat);
document.getElementById('skip-link').addEventListener('click', () => { state.cvText=''; startChat(); });

const userInput = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
userInput.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!sendBtn.disabled) sendMessage(); } });
userInput.addEventListener('input', () => { userInput.style.height='auto'; userInput.style.height=Math.min(userInput.scrollHeight,120)+'px'; });
sendBtn.addEventListener('click', sendMessage);
document.addEventListener('touchmove', e => { if(e.target===document.body) e.preventDefault(); }, { passive: false });
</script>
