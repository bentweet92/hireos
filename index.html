<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HireOS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8c547;
    --accent2: #c8a832;
    --danger: #e85547;
    --success: #47c87a;
    --user-bubble: #1e2a1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  /* Full-screen flex shell — works on all mobile browsers */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh; /* dynamic viewport — handles Chrome/Safari address bar */
    width: 100%;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem;
    height: 52px;
    min-height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo { font-family: 'Instrument Serif', serif; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .stage-indicator { display: flex; align-items: center; gap: 5px; }
  .stage-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 0.3s; }
  .stage-dot.active { background: var(--accent); }
  .stage-dot.done { background: var(--success); }
  .stage-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-left: 5px; }

  /* PROGRESS */
  .progress-bar { height: 2px; background: var(--border); flex-shrink: 0; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; width: 0%; }

  /* SCREENS */
  main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* ── UPLOAD ── */
  #screen-upload { align-items: center; justify-content: center; padding: 1.5rem; overflow-y: auto; }
  .upload-inner { max-width: 480px; width: 100%; text-align: center; }

  .upload-inner h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(34px, 7vw, 56px);
    font-weight: 400; line-height: 1.1;
    letter-spacing: -1px; margin-bottom: 0.875rem;
  }
  .upload-inner h1 em { font-style: italic; color: var(--accent); }
  .upload-inner > p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 2rem; }

  .upload-zone {
    border: 1.5px dashed var(--border2); border-radius: 12px;
    padding: 2rem 1.5rem; cursor: pointer;
    transition: all 0.2s; background: var(--surface); margin-bottom: 0.875rem;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #141200; }
  .upload-icon { font-size: 28px; margin-bottom: 0.625rem; display: block; }
  .upload-zone h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .upload-zone p { font-size: 12px; color: var(--muted); margin: 0; }
  #cv-file-input { display: none; }

  .file-selected {
    display: none; align-items: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 0.625rem 0.875rem;
    margin-bottom: 0.875rem; text-align: left;
  }
  .file-selected.show { display: flex; }
  .file-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  .btn-primary {
    width: 100%; padding: 13px 20px;
    background: var(--accent); color: #0a0a0a;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-appearance: none;
  }
  .btn-primary:active { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .skip-link {
    display: block; margin-top: 0.875rem;
    font-size: 13px; color: var(--muted);
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  }

  /* ── CHAT ── */
  #screen-chat { flex-direction: column; }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 1rem 1rem 0.5rem;
    display: flex; flex-direction: column; gap: 0.875rem;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; gap: 8px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 88%; }
  .msg.ai { align-self: flex-start; max-width: 92%; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 2px; font-weight: 500;
  }
  .msg.ai .msg-avatar { background: var(--accent); color: #0a0a0a; }
  .msg.user .msg-avatar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }

  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  .msg.ai .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; }
  .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid #2a3a2a; border-radius: 12px 4px 12px 12px; }
  .msg-bubble strong { color: var(--accent); font-weight: 500; }

  /* Typing */
  .typing-indicator { display: none; align-items: center; gap: 8px; }
  .typing-indicator.show { display: flex; }
  .typing-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .typing-dots { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 12px 12px 12px; padding: 10px 14px; display: flex; gap: 4px; align-items: center; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  /* Input area — KEY: never shrinks, always visible */
  .chat-input-area {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    background: var(--bg);
    /* Safe area for notch/home bar */
    padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
  }

  .input-row { display: flex; gap: 8px; align-items: flex-end; max-width: 680px; margin: 0 auto; }

  #user-input {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 10px;
    padding: 11px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px; /* 16px prevents iOS zoom */
    font-weight: 300; resize: none;
    min-height: 44px; max-height: 120px;
    line-height: 1.4; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #user-input:focus { outline: none; border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px; min-width: 44px;
    background: var(--accent); border: none; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 18px; color: #0a0a0a;
    -webkit-appearance: none;
  }
  #send-btn:active { background: var(--accent2); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint { text-align: center; margin-top: 5px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--border2); letter-spacing: 0.05em; }

  /* ── PROFILE ── */
  #screen-profile { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.25rem; }
  .profile-inner { max-width: 640px; margin: 0 auto; padding-bottom: 2rem; }

  .profile-header { margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .profile-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .profile-header h1 { font-family: 'Instrument Serif', serif; font-size: clamp(26px, 5vw, 34px); font-weight: 400; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  .profile-header p { font-size: 12px; color: var(--muted); }

  .profile-section { margin-bottom: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ps-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .ps-icon { font-size: 14px; }
  .ps-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; color: var(--muted); }
  .ps-body { padding: 1rem; }
  .ps-body p { font-size: 14px; line-height: 1.65; margin-bottom: 0.625rem; }
  .ps-body p:last-child { margin-bottom: 0; }

  .target-role-card { background: linear-gradient(135deg,#1a1800,#111); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .target-role-title { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--accent); margin-bottom: 3px; }
  .target-role-sub { font-size: 12px; color: var(--muted); }

  .salary-display { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 0.75rem; }
  .salary-cell { background: var(--surface2); padding: 0.875rem; text-align: center; }
  .salary-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  .salary-value { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--accent); }

  .asset-item { display: flex; gap: 8px; margin-bottom: 0.625rem; align-items: flex-start; }
  .asset-item:last-child { margin-bottom: 0; }
  .asset-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 7px; flex-shrink: 0; }
  .asset-text { font-size: 14px; line-height: 1.6; }

  .gap-item { display: flex; gap: 8px; margin-bottom: 0.875rem; align-items: flex-start; }
  .gap-item:last-child { margin-bottom: 0; }
  .gap-tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; margin-top: 3px; }
  .gap-tag.fix { background: #1a2a1a; color: var(--success); }
  .gap-tag.note { background: #2a2200; color: var(--accent); }
  .gap-tag.risk { background: #2a1a1a; color: var(--danger); }
  .gap-text { font-size: 14px; line-height: 1.6; }
  .gap-action { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .action-item { display: flex; gap: 10px; margin-bottom: 0.75rem; align-items: flex-start; }
  .action-item:last-child { margin-bottom: 0; }
  .action-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #0a0a0a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .action-text { font-size: 14px; line-height: 1.6; }

  .profile-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn-secondary { flex: 1; padding: 11px 16px; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; text-align: center; min-width: 120px; -webkit-appearance: none; }
  .btn-secondary:active { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.88); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
  .loading-overlay.show { display: flex; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* NOTIFICATION */
  .notif { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.625rem 1rem; font-size: 13px; z-index: 200; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Hire<span>OS</span></div>
    <div class="stage-indicator">
      <div class="stage-dot active" id="dot-1"></div>
      <div class="stage-dot" id="dot-2"></div>
      <div class="stage-dot" id="dot-3"></div>
      <span class="stage-label" id="stage-label">Upload CV</span>
    </div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <main>

    <!-- UPLOAD -->
    <div class="screen active" id="screen-upload">
      <div class="upload-inner">
        <h1>Your career,<br><em>decoded.</em></h1>
        <p>Upload your CV. Answer a few questions. Find out what you're worth and exactly why your search isn't working.</p>
        <div class="upload-zone" id="upload-zone">
          <span class="upload-icon">📄</span>
          <h3>Tap to upload your CV</h3>
          <p>PDF · Max 5MB</p>
          <input type="file" id="cv-file-input" accept=".pdf">
        </div>
        <div class="file-selected" id="file-selected">
          <span>📄</span>
          <span class="file-name" id="file-name">—</span>
          <span class="file-size" id="file-size">—</span>
        </div>
        <button class="btn-primary" id="start-btn" disabled>Start My Diagnostic →</button>
        <span class="skip-link" id="skip-link">Continue without CV</span>
      </div>
    </div>

    <!-- CHAT -->
    <div class="screen" id="screen-chat">
      <div class="chat-messages" id="chat-messages">
        <div class="typing-indicator" id="typing">
          <div class="typing-avatar">H</div>
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="user-input" placeholder="Type your answer..." rows="1"></textarea>
          <button id="send-btn" disabled>↑</button>
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="screen-profile">
      <div class="profile-inner" id="profile-content"></div>
    </div>

  </main>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Reading your CV...</div>
</div>
<div class="notif" id="notif"></div>

<script>
const API_URL = '/api/chat';

const state = { cvText: '', messages: [], questionCount: 0, profileData: null };

function buildSystem() {
  const cv = state.cvText
    ? `\n\nCANDIDATE CV:\n"""\n${state.cvText}\n"""\n\nYou have already read this CV in full. Question 1 is answered by the CV — do not ask them about their role or background, you already know it. Start from Question 2.`
    : '\n\nNo CV uploaded. Start with Question 1 — ask them about their current role and what they actually do day to day.';

  return `You are a straight-talking career coach having a real conversation with a job seeker. Your job is to understand their full situation, find what they are underselling, tell them what they are actually worth, and identify exactly why their search is not converting.

TONE — THIS IS THE MOST IMPORTANT INSTRUCTION:
- Sound like a smart friend who knows the job market. Not a bot. Not a consultant.
- 2-3 sentences per reply. Never more. Never a wall of text.
- One question per message. Always exactly one.
- No corporate filler. No "certainly", "absolutely", "great question", "I'd be happy to". None of it.
- React like a human. If something is impressive, say so directly. If something doesn't add up, push back.
- Plain words. Short sentences.
${cv}

YOUR STRUCTURED FLOW — follow this sequence in order, one question per exchange:

QUESTION 1 — ROLE & BACKGROUND (skip if CV uploaded, you already know this):
Ask: what they do, what company, how long they have been there.
Listen for: gaps between title and actual responsibility. Someone doing a manager's job with a junior title.

QUESTION 2 — REAL ACCOMPLISHMENTS (not job description, not CV bullets):
Ask: what they are genuinely proud of — specific moments, numbers, things they fixed or built. What is one thing they did that was not in their job description but made a real difference?
Listen for: the hidden asset. The thing they mention casually that is actually significant. When you find it, call it out — "that's actually a big deal, most people don't get to do that."

QUESTION 3 — WHERE THEY WANT TO GO:
Ask: what they are targeting — role, industry, type of company. If they are unsure, ask what matters most — more money, different work, bigger company, something else.
Listen for: whether their target makes sense given their background. If it does not, say so directly and suggest what actually fits them better.

QUESTION 4 — WHAT IS BLOCKING THEM:
Ask: what they have already tried. Are they applying and getting no callbacks? Getting interviews but no offers? Not applying at all? What is the wall they are hitting?
Listen for: the real diagnosis. Is it positioning (wrong role), signal (CV not matching), or strategy (applying to wrong places)?

QUESTION 5 — SALARY AND CONSTRAINTS:
Ask two things: what salary they are currently on, and what they are hoping for. Also ask if there are hard constraints — location, things they will not do.
Listen for: whether their expectation is realistic. Then calculate honestly using this logic:

SALARY CALCULATION RULES — follow these strictly, do not use generic market data:
- Lateral move to similar role at a bigger company: 15–25% above current CTC. That is the realistic range most companies offer.
- Step-up in role or seniority with strong proof: 25–40% above current CTC. Only if their experience clearly justifies it.
- Career change to a different industry: sometimes 0–15% above current CTC. A switch often means accepting a reset temporarily.
- Never suggest a number more than 40% above current CTC unless they have exceptional, specific credentials that clearly justify it.
- If they have under 3 years experience, stay conservative. Entry-level markets are tight.
- Always anchor the estimate to their current salary. A person earning ₹6 LPA realistically targets ₹7–8 LPA for a lateral move or ₹8–9 LPA for a step-up — not ₹15 LPA regardless of role.
- If their expectation is unrealistic, say so directly with the correct number. Example: "You're on ₹8.4 LPA. A Training Manager move at a bigger company will realistically get you ₹10–12 LPA. ₹15 LPA needs a VP-level role or a company paying top-of-market."

AFTER QUESTION 5:
You now have all 5 answers. Do not ask anything else. Generate the profile immediately.

CRITICAL — CONNECT ALL 5 ANSWERS BEFORE GENERATING THE PROFILE:
Before writing the JSON, internally connect the dots:
- Does their target role (Q3) match their actual background (Q1+Q2)?
- Does the blocker they described (Q4) explain why — is it a positioning problem, a CV signal problem, or a strategy problem?
- Is their salary expectation (Q5) realistic given their current pay, their experience level, and their target role?
- What is the single most important thing they are not seeing about their own situation?
The profile must reflect these connections. Every section should feel like it was written specifically for this person's situation — not a generic output that could apply to anyone.

WHEN YOU HAVE ENOUGH INFORMATION, output ONLY this JSON wrapped in the exact tags below. Nothing before it, nothing after it:
<PROFILE_START>
{
  "name": "their name or Professional",
  "target_role": "Specific role title",
  "target_industries": ["Industry 1", "Industry 2"],
  "profile_summary": "2-3 honest sentences on who this person is and why they are valuable. Plain language.",
  "hidden_assets": [
    "Specific thing they underplayed or forgot to mention that is actually valuable",
    "Another one",
    "Another one"
  ],
  "market_value": {
    "current_ctc": "₹X LPA — what they told you they earn now",
    "realistic_target": "₹X–Y LPA — calculated as 15-40% above current CTC based on role type and experience",
    "ceiling": "₹X LPA — only achievable with the right company and strong negotiation",
    "rationale": "One plain sentence explaining exactly how you calculated this from their current salary and target role"
  },
  "positioning_gaps": [
    {"type": "fix", "issue": "Specific problem", "action": "Exact thing to do — one sentence"},
    {"type": "note", "issue": "Something to be aware of", "action": "How to handle it"},
    {"type": "risk", "issue": "Real risk in their search", "action": "How to mitigate"}
  ],
  "target_companies": {
    "tier1": ["Company 1", "Company 2", "Company 3"],
    "tier2": ["Company 1", "Company 2"],
    "avoid": ["Type of company to avoid — one line reason"]
  },
  "why_not_converting": "Honest 2-3 sentence answer to why their search is not working. Be specific to their situation.",
  "next_actions": [
    "One specific thing to do today — not vague",
    "One thing to do this week",
    "One thing to do before applying anywhere"
  ]
}
<PROFILE_END>`;
}

async function callAPI(messages, maxTokens) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system: buildSystem(), max_tokens: maxTokens || 300 })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `HTTP ${r.status}`); }
  const d = await r.json();
  return d.content;
}

async function readPDF(file) {
  if (!window.pdfjsLib) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(x => x.str).join(' ') + '\n';
  }
  return text.trim();
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function setStage(stage) {
  const map = { upload:[1,'Upload CV'], chat:[2,'Diagnostic'], profile:[3,'Your Profile'] };
  const [n, label] = map[stage];
  document.querySelectorAll('.stage-dot').forEach((d,i) => {
    d.className = 'stage-dot';
    if (i+1 < n) d.classList.add('done');
    else if (i+1 === n) d.classList.add('active');
  });
  document.getElementById('stage-label').textContent = label;
  document.getElementById('progress').style.width = `${(n/3)*100}%`;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${stage}`).classList.add('active');
  if (stage === 'chat') setTimeout(scrollBottom, 100);
}

function showLoading(t) { document.getElementById('loading-text').textContent = t||''; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showTyping() { document.getElementById('typing').classList.add('show'); scrollBottom(); }
function hideTyping() { document.getElementById('typing').classList.remove('show'); }
function scrollBottom() { const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; }

function notify(text, ms) {
  const n = document.getElementById('notif');
  n.textContent = text; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), ms||3000);
}

function addMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const typing = document.getElementById('typing');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'ai' ? 'H' : 'Y';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  msg.appendChild(av); msg.appendChild(bubble);
  container.insertBefore(msg, typing);
  setTimeout(scrollBottom, 50);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startChat() {
  setStage('chat');
  document.getElementById('send-btn').disabled = false;
  showTyping();
  const opening = state.cvText
    ? 'I have uploaded my CV. Please start.'
    : 'I have not uploaded a CV. Please start.';
  state.messages = [{ role: 'user', content: opening }];
  try {
    const reply = await callAPI(state.messages, 300);
    hideTyping();
    if (reply.includes('<PROFILE_START>')) { processProfile(reply); return; }
    addMessage('ai', reply);
    state.messages.push({ role: 'assistant', content: reply });
    state.questionCount = 1;
  } catch(err) {
    hideTyping();
    addMessage('ai', `Connection error: ${err.message}. Please refresh and try again.`);
  }
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);
  state.messages.push({ role: 'user', content: text });
  state.questionCount++;
  showTyping();
  try {
    const isLast = state.questionCount >= 5;
    const msgs = isLast
      ? [...state.messages, { role: 'user', content: '[Generate the Career Intelligence Profile JSON now.]' }]
      : state.messages;
    const reply = await callAPI(msgs, isLast ? 2000 : 300);
    hideTyping();
    if (reply.includes('<PROFILE_START>')) {
      addMessage('ai', "Got everything I need. Putting your profile together now...");
      await sleep(1000);
      processProfile(reply);
    } else {
      addMessage('ai', reply);
      state.messages.push({ role: 'assistant', content: reply });
      document.getElementById('send-btn').disabled = false;
    }
  } catch(err) {
    hideTyping();
    addMessage('ai', `Something went wrong: ${err.message}. Try again.`);
    document.getElementById('send-btn').disabled = false;
  }
}

function processProfile(raw) {
  try {
    const match = raw.match(/<PROFILE_START>([\s\S]*?)<PROFILE_END>/);
    if (!match) throw new Error('no tags');
    const data = JSON.parse(match[1].trim());
    state.profileData = data;
    showLoading('Building your Career Intelligence Profile...');
    setTimeout(() => { hideLoading(); renderProfile(data); setStage('profile'); }, 1800);
  } catch(err) {
    console.error(err);
    regenProfile();
  }
}

async function regenProfile() {
  showLoading('Generating your profile...');
  try {
    const msgs = [...state.messages, { role:'user', content:'Generate my Career Intelligence Profile JSON now in the exact format.' }];
    const reply = await callAPI(msgs, 2000);
    hideLoading();
    const match = reply.match(/<PROFILE_START>([\s\S]*?)<PROFILE_END>/);
    if (match) { const d = JSON.parse(match[1].trim()); state.profileData = d; renderProfile(d); setStage('profile'); }
    else notify('Could not generate profile. Keep talking and try again.');
  } catch(err) { hideLoading(); notify('Error. Please refresh.'); }
}

          <div class="salary-cell"><div class="salary-label">Realistic Target</div><div class="salary-value">${d.market_value.realistic_target}</div></div>

      <div class="ps-header"><span class="ps-icon">💎</span><span class="ps-title">What Your CV Is Missing</span></div>

        ${d.target_companies.tier1.map(c=>`<div class="asset-item"><div class="asset-dot"></div><div class="asset-text">${c}</div></div>`).join('')}
        <p style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin:.75rem 0 .625rem">Also worth trying</p>
        ${d.target_companies.tier2.map(c=>`<div class="asset-item"><div class="asset-dot" style="background:var(--border2)"></div><div class="asset-text">${c}</div></div>`).join('')}
        ${d.target_companies.avoid?.length?`<p style="font-size:11px;color:var(--danger);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin:.75rem 0 .625rem">Skip for now</p>${d.target_companies.avoid.map(c=>`<div class="asset-item"><div class="asset-dot" style="background:var(--danger)"></div><div class="asset-text" style="color:var(--muted)">${c}</div></div>`).join('')}`:''}
      </div>
    </div>

      <div class="ps-header"><span class="ps-icon">→</span><span class="ps-title">Next 3 Actions</span></div>

    </div>

      <button class="btn-secondary" onclick="continueChat()">💬 Keep Going</button>

}

function continueChat() {
  setStage('chat');
  addMessage('ai', "What do you want to work on — rewriting your CV, interview prep, or how to approach companies?");
  document.getElementById('send-btn').disabled = false;
}

function startOver() {
  Object.assign(state,{cvText:'',messages:[],questionCount:0,profileData:null});
  document.getElementById('chat-messages').innerHTML = `<div class="typing-indicator" id="typing"><div class="typing-avatar">H</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('file-selected').classList.remove('show');
  document.getElementById('start-btn').disabled = true;
  setStage('upload');
}

// UPLOAD
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('cv-file-input');
const startBtn   = document.getElementById('start-btn');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (file.size > 5*1024*1024) { notify('File too large. Max 5MB.'); return; }
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-size').textContent = `${(file.size/1024).toFixed(0)} KB`;
  document.getElementById('file-selected').classList.add('show');
  showLoading('Reading your CV...');
  try {
    state.cvText = await readPDF(file);
    hideLoading(); startBtn.disabled = false;
    notify(state.cvText ? 'CV read ✓' : 'CV uploaded');
  } catch(err) {
    hideLoading(); startBtn.disabled = false; state.cvText = '';
    notify('Could not read CV. Continuing without it.');
  }
}

startBtn.addEventListener('click', startChat);
document.getElementById('skip-link').addEventListener('click', () => { state.cvText=''; startChat(); });

// INPUT — keyboard handling for all devices
const userInput = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');

userInput.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); if(!sendBtn.disabled) sendMessage(); }
});
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});
sendBtn.addEventListener('click', sendMessage);

// Prevent body scroll bounce on iOS when input is focused
document.addEventListener('touchmove', e => { if(e.target === document.body) e.preventDefault(); }, { passive: false });
</script>
</body>
</html>
